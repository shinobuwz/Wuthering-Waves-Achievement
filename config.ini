; ============================================
; 鸣潮成就管理器 - OCR 扫描配置
; 修改后需重启应用生效
; ============================================

[ocr.matching]
; 模板匹配置信度阈值（0~1，越高越严格）
match_threshold = 0.75
; 非极大值抑制合并距离（像素），用于去除重复检测
nms_distance = 40

[ocr.name_region]
; 成就名称裁剪区域（相对于图标左上角的像素偏移）
dx = 122
dy = -39
width = 503
height = 40

[ocr.status_region]
; 成就状态裁剪区域（相对于图标左上角的像素偏移）
dx = 878
dy = 15
width = 163
height = 47

[ocr.scroll]
; 每次 pyautogui.scroll 的值（负数=列表向下滚动）
scroll_length = -160
; 成就列表连续滚动次数（利用惯性叠加）
scroll_times = 15
; 二级 Tab 列表连续滚动次数
scroll_times_tab = 16
; 滚动后等待时间（秒），等待动画完成
scroll_delay = 0.8

[ocr.layout]
; 界面布局参数（百分比，基于截图宽高）
; 一级 Tab 名称 OCR 识别区域
primary_tab_x1 = 0.053
primary_tab_y1 = 0.047
primary_tab_x2 = 0.114
primary_tab_y2 = 0.083
; 一级 Tab 图标点击 x 坐标（固定）
primary_tab_icon_x = 0.0417
; 一级 Tab 图标点击 y 坐标（逗号分隔：索拉漫行, 铿锵刃鸣, 长路留迹, 诸音声轨）
primary_tab_icon_y_list = 0.1778, 0.2981, 0.4343, 0.5537
; 二级 Tab 列表区域
secondary_tab_x1 = 0.1005
secondary_tab_y1 = 0.1796
secondary_tab_x2 = 0.3479
secondary_tab_y2 = 1.0000

[ocr.timing]
; 窗口激活后等待时间（秒）
delay_foreground = 0.3
; 鼠标移动后等待时间（秒）
delay_move = 0.1
; 点击二级 Tab 后等待时间（秒）
delay_click_secondary = 0.5
; 点击一级 Tab 后等待动画时间（秒）
delay_click_primary = 0.8
; 切换二级 Tab 后等待成就列表加载时间（秒）
delay_list_load = 0.5

[game]
; 游戏进程名（逗号分隔，用于窗口检测）
process_names = Client-Win64-Shipping.exe, Wuthering Waves.exe
; 期望的游戏窗口分辨率
expected_width = 1920
expected_height = 1080
