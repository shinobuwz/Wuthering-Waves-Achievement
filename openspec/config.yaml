schema: spec-driven

context: |
  技术栈：Python 3.8+, PySide6, Windows 桌面应用
  项目：鸣潮成就管理器
  Python 环境：conda 的 ww-achievement 环境
  - 所有 pip install / python 命令必须在 conda activate ww-achievement 后执行
  - 非交互式 shell 中使用 conda run：conda run -n ww-achievement pip install -i https://pypi.tuna.tsinghua.edu.cn/simple ...
  - 运行脚本命令：conda run -n ww-achievement python ...
  领域：游戏工具（鸣潮 / Wuthering Waves）

